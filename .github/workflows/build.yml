name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

# Run bundled JS actions on Node 24 (silences the Node 20 deprecation warning).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # keytar (optional dep of vsce) builds a native module and is only needed
      # for `vsce publish`, not for packaging.
      - run: npm ci --omit=optional

      - run: npm run check-types

      - run: npm run vsix

      - name: Read package version
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Add version to .vsix filename
        run: mv screenshot-renamer.vsix screenshot-renamer-${{ steps.pkg.outputs.version }}.vsix

      - name: Upload .vsix artifact
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-renamer-vsix
          path: screenshot-renamer-*.vsix

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: screenshot-renamer-*.vsix
          generate_release_notes: true
